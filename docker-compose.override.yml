# Aplicado automaticamente pelo Docker Compose em `docker compose up` (sem `-f`).
# Não é necessário (nem recomendado) copiar este arquivo para a VPS — lá, o
# `docker-compose.yml` sozinho já sobe a stack de produção.
services:
  postgres:
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro

  api:
    build:
      target: dev
    environment:
      # `env.ts` carrega `.env` sem `override`, então esta variável (já definida no processo
      # antes do require) vence o `.env` do host (que aponta para "localhost", usado pelo
      # `npm run dev` fora do Docker) mesmo com `.env` sendo montado junto via bind mount.
      - DATABASE_URL=postgresql://portus:portus@postgres:5432/portus_dev?schema=public
    volumes:
      - .:/app
      - /app/node_modules
